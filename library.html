    <div id="ranking-gallery-modal" class="fixed inset-0 z-[150] flex items-center justify-center hidden"><div onclick="LibraryApp.toggleGalleryModal(false)" class="absolute inset-0 bg-dark/95 backdrop-blur-2xl"></div><img id="gallery-bg" src="" class="absolute inset-0 w-full h-full object-cover opacity-20"><div id="gallery-content-wrapper" class="relative w-full max-w-6xl px-12 py-20 flex flex-col md:flex-row items-center gap-16"><button onclick="LibraryApp.toggleGalleryModal(false)" class="absolute top-0 right-12 w-12 h-12 rounded-full bg-white/10 text-white flex items-center justify-center"><i class="ph ph-x text-2xl"></i></button><div class="w-full md:w-1/2 flex justify-center"><div class="relative group"><div id="gallery-rank-badge" class="absolute -top-10 -left-10 w-24 h-24 rounded-full bg-accentYellow text-dark flex items-center justify-center text-4xl font-black z-20">1</div><img id="gallery-cover" src="" class="w-[320px] rounded-3xl shadow-2xl bg-white/5 border border-white/10"></div></div><div class="w-full md:w-1/2 text-left space-y-8"><span id="gallery-category" class="px-4 py-1 rounded-full bg-accentBlue text-dark text-[10px] font-bold">CATEGORY</span><h2 id="gallery-title" class="text-5xl lg:text-7xl font-bold text-white leading-tight font-serif">Book Title</h2><p id="gallery-author" class="text-xl text-gray-400 mt-4">By Author</p><div class="pt-10 flex items-center gap-6"><button onclick="LibraryApp.prevGallery()" class="w-16 h-16 rounded-full border border-white/20 text-white flex items-center justify-center"><i class="ph ph-arrow-left text-2xl"></i></button><button onclick="LibraryApp.nextGallery()" class="w-16 h-16 rounded-full bg-white text-dark flex items-center justify-center hover:bg-accentYellow transition-colors"><i class="ph ph-arrow-right text-2xl"></i></button></div></div></div></div>

    <script>
        const skeletonDiv = document.getElementById('loading-skeleton');
        for(let i=0; i<8; i++) skeletonDiv.innerHTML += `<div class="bg-cardLight rounded-[32px] p-6 border shadow-soft space-y-4"><div class="w-full aspect-[3/4] shimmer rounded-2xl"></div><div class="h-6 w-3/4 shimmer rounded-lg"></div></div>`;

        let currentUserId = localStorage.getItem('edu_space_user') || null;
        
        // --- 全新改造：基于 Supabase 的真实 API ---
        const api = {
            getUser: async (id) => {
                const { data, error } = await window.supabase.from('users').select('*').eq('student_id', id).single();
                if (error) { console.error("获取用户失败:", error); return null; }
                return data;
            },
            getArchives: async (id, category) => {
                const { data, error } = await window.supabase.from('archives').select(category).eq('student_id', id).single();
                if (error || !data) return { [category]: [] };
                return data;
            },
            borrowBook: async (req) => {
                // 1. 先查出此人当前的 library 数组
                const { data: archData, error: archError } = await window.supabase.from('archives').select('library').eq('student_id', req.student_id).single();
                if (archError && archError.code !== 'PGRST116') throw new Error("获取档案失败");
                
                let currentLibrary = (archData && archData.library) ? archData.library : [];
                
                // 2. 将新书压入数组最前方
                const newBook = { title: req.title, author: req.author, borrow_date: new Date().toLocaleDateString().replace(/\//g, '.'), due_date: new Date(Date.now() + 30*24*60*60*1000).toLocaleDateString().replace(/\//g, '.'), status: "借阅中", days_left: 30, cover: req.cover };
                currentLibrary.unshift(newBook);
                
                // 3. 执行 update 将合并后的数组覆盖上去
                const { error: updateError } = await window.supabase.from('archives').update({ library: currentLibrary }).eq('student_id', req.student_id);
                if (updateError) throw new Error("写入档案表失败");
                
                return { message: "成功" };
            }
        };

        const galleryData = [
            { rank: 1, title: "三体", author: "刘慈欣", category: "科幻", cover: "https://covers.openlibrary.org/b/id/10246665-L.jpg", bg: "https://images.unsplash.com/photo-1484589065579-248aad0d8b13?auto=format&fit=crop&q=80&w=1200" },
            { rank: 2, title: "人类简史", author: "尤瓦尔", category: "社科", cover: "https://covers.openlibrary.org/b/id/8780917-L.jpg", bg: "https://images.unsplash.com/photo-1449157291145-7efd050a4d0e?auto=format&fit=crop&q=80&w=1200" }
        ];
        const featuredData = [
            { tag: "⭐ 精选", title: "《百年孤独》", desc: "马尔克斯的魔幻现实史诗", bgImage: "https://images.unsplash.com/photo-1763641302132-d27dad02a19a?auto=format&fit=crop&q=80&w=1200", workId: "OL274505W" },
            { tag: "🚀 科幻", title: "《三体》全集", desc: "中国科幻的巅峰之作", bgImage: "https://images.unsplash.com/photo-1484589065579-248aad0d8b13?auto=format&fit=crop&q=80&w=1200", workId: "OL17267881W" }
        ];

        const LibraryApp = {
            state: { cachedBooks: [], isTranslating: false, sliderIndex: 0, galleryIndex: 0, sliderTimer: null, currentViewingBook: null },
            init() {
                this.syncUserUI(); this.renderHotList(); this.initSlider();
                this.fetchBooks('popular psychology', 8);
                document.getElementById('book-search-input').addEventListener('keypress', (e) => { if(e.key==='Enter') this.performSearch(); });
            },
            async syncUserUI() { if(currentUserId) { const user = await api.getUser(currentUserId); if(user) document.getElementById('header-avatar-library').src = user.avatar; } },
            toggleGalleryModal(show, index = 0) {
                const modal = document.getElementById('ranking-gallery-modal');
                if(show) { modal.classList.remove('hidden'); this.updateGallery(index); } else modal.classList.add('hidden');
            },
            updateGallery(index) {
                this.state.galleryIndex = index; const data = galleryData[index];
                document.getElementById('gallery-bg').src = data.bg; document.getElementById('gallery-cover').src = data.cover;
                document.getElementById('gallery-title').textContent = data.title; document.getElementById('gallery-author').textContent = data.author;
                document.getElementById('gallery-category').textContent = data.category; document.getElementById('gallery-rank-badge').textContent = data.rank;
            },
            nextGallery() { this.updateGallery((this.state.galleryIndex + 1) % galleryData.length); },
            prevGallery() { this.updateGallery((this.state.galleryIndex - 1 + galleryData.length) % galleryData.length); },
            initSlider() { this.updateSlider(0); this.state.sliderTimer = setInterval(() => this.updateSlider((this.state.sliderIndex + 1) % featuredData.length), 6000); },
            updateSlider(index) {
                const data = featuredData[index];
                document.getElementById('featured-bg').src = data.bgImage; document.getElementById('feat-title').innerHTML = data.title;
                document.getElementById('feat-desc').textContent = data.desc; document.getElementById('feat-tag').textContent = data.tag;
                this.state.sliderIndex = index;
                document.getElementById('feat-indicators').innerHTML = featuredData.map((_, i) => `<div class="w-2 h-2 rounded-full ${i===index?'bg-white w-6':'bg-white/30'}"></div>`).join('');
            },
            async openFeaturedDetail() {
                try { const res = await fetch(`https://openlibrary.org/works/${featuredData[this.state.sliderIndex].workId}.json`); this.renderOpenWorkDetail(await res.json()); } catch(e){}
            },
            renderHotList() {
                document.getElementById('hot-list').innerHTML = galleryData.map((i, idx) => `<div onclick="LibraryApp.toggleGalleryModal(true, ${idx})" class="flex items-center gap-4 group cursor-pointer p-2 hover:bg-gray-50 rounded-2xl"><div class="w-12 h-16 shrink-0 bg-white shadow-sm border p-0.5"><img src="${i.cover}" class="w-full h-full object-contain"></div><div><h4 class="font-bold text-dark text-sm group-hover:text-accentOrange">${i.title}</h4><p class="text-xs text-gray-400">${i.author}</p></div></div>`).join('');
            },
            performSearch() { this.fetchBooks(document.getElementById('book-search-input').value.trim()); },
            async fetchBooks(query, max=12) {
                if(!query) return;
                document.getElementById('books-grid').innerHTML = ''; document.getElementById('loading-skeleton').classList.remove('hidden');
                try { const res = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(query)}&limit=${max}`); const data = await res.json(); this.state.cachedBooks = data.docs||[]; this.renderBooks(this.state.cachedBooks); }
                catch(e) { document.getElementById('books-grid').innerHTML = `<div class="col-span-full text-center text-gray-400 py-10">网络错误</div>`; }
                finally { document.getElementById('loading-skeleton').classList.add('hidden'); }
            },
            renderBooks(books) {
                document.getElementById('books-grid').innerHTML = books.map((book, idx) => `<div onclick="LibraryApp.openBookDetail(${idx})" class="book-card bg-cardLight rounded-[32px] p-6 border shadow-soft cursor-pointer"><div class="w-full aspect-[3/4] mb-6 rounded-2xl flex items-center justify-center bg-white/50 border"><img src="${book.cover_i ? `https://covers.openlibrary.org/b/id/${book.cover_i}-M.jpg` : 'https://via.placeholder.com/300'}" class="max-h-full max-w-full object-contain"></div><h4 class="font-bold text-dark text-lg line-clamp-1">${book.title}</h4><p class="text-xs text-gray-400 mt-1">${book.author_name ? book.author_name[0] : '未知'}</p></div>`).join('');
            },
            async openBookDetail(index) {
                const book = this.state.cachedBooks[index]; if(!book) return;
                try { const res = await fetch(`https://openlibrary.org${book.key}.json`); this.renderOpenWorkDetail(await res.json(), book); } catch(e){}
            },
            renderOpenWorkDetail(work, searchData=null) {
                const title = work.title || (searchData ? searchData.title : '未知');
                const author = searchData && searchData.author_name ? searchData.author_name[0] : '未知';
                const coverId = work.covers ? work.covers[0] : (searchData ? searchData.cover_i : '');
                const coverUrl = coverId ? `https://covers.openlibrary.org/b/id/${coverId}-L.jpg` : 'https://via.placeholder.com/400';
                this.state.currentViewingBook = { title, author, cover: coverUrl };
                
                document.getElementById('detail-cover').src = coverUrl; document.getElementById('detail-title').textContent = title;
                document.getElementById('detail-author').textContent = author; document.getElementById('detail-desc').innerHTML = work.description ? (typeof work.description === 'string' ? work.description : work.description.value) : '暂无简介。';
                
                const borrowBtn = document.getElementById('borrow-btn');
                borrowBtn.innerHTML = '立即预约借阅'; 
                borrowBtn.disabled = false;
                borrowBtn.className = "w-full bg-dark text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all";
                
                this.toggleBookDetailModal(true);
            },

            // 拦截二次借阅并触发确认弹窗 (改为异步校验云端)
            async borrowCurrentBook() {
                if (!this.state.currentViewingBook) return;

                const btn = document.getElementById('borrow-btn');
                btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> 校验状态...';
                
                // 防重复借阅校验：从云端拉取最新借阅记录
                const archData = await api.getArchives(currentUserId, 'library');
                const lib = archData.library || [];
                const isAlreadyBorrowed = lib.some(book => book.title === this.state.currentViewingBook.title);
                
                if (isAlreadyBorrowed) {
                    btn.innerHTML = `<i class="ph-bold ph-warning-circle text-lg"></i> 该书已在借阅列表中`;
                    btn.classList.replace('bg-dark', 'bg-accentRed');
                    btn.disabled = true;
                    setTimeout(() => {
                        btn.innerHTML = '立即预约借阅';
                        btn.classList.replace('bg-accentRed', 'bg-dark');
                        btn.disabled = false;
                    }, 2000);
                    return;
                }
                
                btn.innerHTML = '立即预约借阅';
                // 调出二次确认弹窗
                document.getElementById('confirm-book-title').textContent = `《${this.state.currentViewingBook.title}》`;
                this.toggleBorrowConfirmModal(true);
            },

            toggleBorrowConfirmModal(show) {
                const m = document.getElementById('borrow-confirm-modal');
                if (show) m.classList.remove('hidden');
                else m.classList.add('hidden');
            },

            // 正式执行借阅及成功动画
            async executeBorrow() {
                const btn = document.getElementById('execute-borrow-btn');
                btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> 处理中...';
                btn.disabled = true;

                try {
                    await api.borrowBook({ student_id: currentUserId, ...this.state.currentViewingBook });
                    
                    this.toggleBorrowConfirmModal(false);
                    this.toggleBookDetailModal(false);

                    // 触发成功动画
                    const successModal = document.getElementById('borrow-success-modal');
                    const successCard = document.getElementById('success-animation-card');
                    successModal.classList.remove('hidden');
                    
                    requestAnimationFrame(() => {
                        successCard.classList.replace('scale-50', 'scale-100');
                        successCard.classList.replace('opacity-0', 'opacity-100');
                    });

                    setTimeout(() => {
                        successCard.classList.replace('scale-100', 'scale-50');
                        successCard.classList.replace('opacity-100', 'opacity-0');
                        setTimeout(() => {
                            successModal.classList.add('hidden');
                            this.toggleBorrowingModal(true);
                        }, 500);
                    }, 1500);
                } catch(err) {
                    alert("借阅失败：" + err.message);
                } finally {
                    btn.innerHTML = '确认借阅';
                    btn.disabled = false;
                }
            },

            async translateContent() {
                if(this.state.isTranslating) return; this.state.isTranslating = true;
                const titleEl = document.getElementById('detail-title'); const descEl = document.getElementById('detail-desc');
                try {
                    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(titleEl.textContent)}&langpair=en|zh-CN`);
                    titleEl.textContent = (await res.json()).responseData.translatedText;
                } catch(e){}
                this.state.isTranslating = false;
            },
            toggleBookDetailModal(show) { const m = document.getElementById('book-detail-modal'); if(show) m.classList.remove('hidden'); else m.classList.add('hidden'); },
            async toggleBorrowingModal(show) {
                const m = document.getElementById('borrowing-modal'); const content = document.getElementById('borrowing-content');
                if(show) {
                    const archData = await api.getArchives(currentUserId, 'library');
                    const lib = archData.library || [];
                    document.getElementById('borrow-count').textContent = lib.length;
                    content.innerHTML = lib.length ? lib.map(i => `<div class="flex items-center gap-4 p-4 border rounded-2xl bg-bg"><img src="${i.cover}" class="h-16 w-12 object-contain bg-white"><div><h4 class="font-bold text-sm">${i.title}</h4><p class="text-xs text-gray-500">${i.status}</p></div></div>`).join('') : '<p class="text-gray-400 py-10 text-center">暂无记录</p>';
                    m.classList.remove('hidden');
                } else m.classList.add('hidden');
            }
        };

        // 全局：账号彻底删除功能 (同步 EdgeOne/Supabase 环境)
        window.deleteUser = async function(userId, event) {
            event.stopPropagation();
            if (!confirm('警告：确定要彻底删除该校园账号及所有关联档案吗？数据库中的数据将被永久擦除。')) return;

            const { error } = await window.supabase.from('users').delete().eq('student_id', userId);
            if (error) {
                alert("云端删除失败: " + error.message);
                return;
            }

            if (currentUserId === userId) {
                localStorage.removeItem('edu_space_user');
                window.location.href = 'index.html'; // 无账号时重定向回主页进行注册
            }
        };

        window.onload = () => {
            if (!currentUserId) { window.location.href = 'index.html'; return; }
            LibraryApp.init();
        };
    </script>
</body>
</html>
