<!DOCTYPE html>
<html lang="zh-CN" class="no-scrollbar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教务管理后台 - CampusLife</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <script>
        const _supabaseUrl = 'https://rrkyvgexkadfkucokmyv.supabase.co';
        const _supabaseKey = 'sb_publishable_K1G2kk2BaS42t9IYQC3Nkw_v8n-H4ef';
        window.supabase = supabase.createClient(_supabaseUrl, _supabaseKey);
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['DM Sans', 'sans-serif'], serif: ['"Noto Serif SC"', 'serif'] },
                    colors: { bg: '#F3F0EA', cardLight: '#FDFBF7', dark: '#1A1B1F', accentYellow: '#FFD646', accentOrange: '#FF9B85', accentRed: '#FF6B6B', accentBlue: '#A0C4FF', accentPurple: '#BDB2FF', accentGreen: '#16A34A', textDark: '#1F2937' },
                    boxShadow: { 'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)' }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { display: none !important; }
        html { scrollbar-width: none !important; -ms-overflow-style: none !important; }
        .tab-btn.active { border-bottom: 2px solid #1A1B1F; color: #1A1B1F; font-weight: bold; }
        .custom-scrollbar::-webkit-scrollbar { display: block !important; width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
        .fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-bg min-h-screen text-textDark font-sans selection:bg-accentYellow selection:text-dark">

    <div class="max-w-[85%] mx-auto py-8 h-screen flex flex-col">
        <!-- 头部导航 -->
        <header class="flex justify-between items-center mb-8 shrink-0">
            <h1 class="text-3xl font-bold flex items-center gap-3 text-dark tracking-tight">
                <i class="ph-fill ph-chalkboard-teacher text-accentBlue"></i> 教务管理中心
            </h1>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-sm border border-gray-100">
                    <div class="w-2 h-2 rounded-full bg-accentGreen animate-pulse"></div>
                    <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">Admin Online</span>
                </div>
                <button onclick="logout()" class="px-6 py-2 bg-white border border-gray-100 rounded-full shadow-sm text-sm font-bold text-accentRed hover:bg-red-50 transition-colors active:scale-95">退出系统</button>
            </div>
        </header>

        <!-- 主操作区 -->
        <main class="flex-1 grid grid-cols-12 gap-8 overflow-hidden pb-8">
            
            <!-- 左侧：系统导航与学生列表 -->
            <div class="col-span-3 bg-cardLight rounded-[32px] shadow-soft border border-gray-100 p-6 flex flex-col h-full">
                
                <!-- 模块切换 -->
                <div class="space-y-2 mb-6 border-b border-gray-100 pb-6 shrink-0">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3 px-2">系统模块</p>
                    <button onclick="switchMainTab('student')" id="nav-student" class="w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl bg-dark text-white font-bold transition-all text-left shadow-md">
                        <i class="ph-bold ph-users text-lg"></i> 学生档案与后勤
                    </button>
                    <button onclick="switchMainTab('reservation')" id="nav-reservation" class="w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl bg-transparent text-gray-500 hover:bg-gray-100 font-bold transition-all text-left">
                        <i class="ph-bold ph-calendar-check text-lg"></i> 场地预约管理
                    </button>
                    <button onclick="switchMainTab('portal')" id="nav-portal" class="w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl bg-transparent text-gray-500 hover:bg-gray-100 font-bold transition-all text-left">
                        <i class="ph-bold ph-layout text-lg"></i> 门户系统控制
                    </button>
                </div>

                <!-- 学生搜索与列表 (仅在学生模块显示) -->
                <div id="student-list-container" class="flex flex-col flex-1 overflow-hidden transition-opacity duration-300">
                    <div class="relative mb-4 shrink-0">
                        <i class="ph ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="search-student" placeholder="搜索姓名或学号..." class="w-full bg-white border border-gray-100 rounded-xl pl-10 pr-4 py-3 text-sm font-bold outline-none focus:border-accentBlue transition-all shadow-sm" oninput="filterUsers()">
                    </div>
                    <div id="user-list" class="flex-1 overflow-y-auto custom-scrollbar pr-2 pb-6">
                        <div class="text-center text-gray-400 py-10 text-xs font-bold">获取中...</div>
                    </div>
                </div>
            </div>

            <!-- 右侧：详情面板区 -->
            <div class="col-span-9 bg-cardLight rounded-[32px] shadow-soft border border-gray-100 flex flex-col h-full overflow-hidden">
                
                <!-- 视图 1：学生档案视图 -->
                <div id="view-student" class="flex flex-col h-full hidden">
                    <div id="student-header" class="p-8 border-b border-gray-100 bg-white flex justify-between items-center hidden shrink-0">
                        <div class="flex items-center gap-5">
                            <img id="cur-avatar" src="" class="w-16 h-16 rounded-full border-2 border-gray-100 object-cover shadow-sm">
                            <div>
                                <div class="flex items-center gap-2">
                                    <h3 class="text-2xl font-bold text-dark" id="cur-name">---</h3>
                                    <span class="px-2 py-0.5 bg-gray-100 text-gray-500 text-[10px] font-bold rounded" id="cur-gender">男</span>
                                </div>
                                <p class="text-xs text-gray-400 font-bold uppercase tracking-widest mt-1.5" id="cur-info">学号: --- | 班级: ---</p>
                            </div>
                        </div>
                    </div>
                    <div id="student-empty" class="flex-1 flex flex-col items-center justify-center text-gray-400 p-8 text-center bg-white/50">
                        <div class="w-24 h-24 bg-gray-50 rounded-full flex items-center justify-center mb-4"><i class="ph-duotone ph-student text-5xl text-gray-300"></i></div>
                        <p class="font-bold text-lg text-dark mb-1">未选择学生</p>
                        <p class="text-sm">请在左侧列表选择一位学生进行操作</p>
                    </div>
                    
                    <div id="student-content" class="flex flex-col flex-1 overflow-hidden hidden">
                        <div class="flex px-8 border-b border-gray-100 gap-8 text-sm text-gray-400 font-bold shrink-0 bg-white">
                            <button class="tab-btn active pb-4 pt-6 transition-all" onclick="switchDataTab('academic')">学术成绩</button>
                            <button class="tab-btn pb-4 pt-6 transition-all" onclick="switchDataTab('health')">体质健康</button>
                            <button class="tab-btn pb-4 pt-6 transition-all" onclick="switchDataTab('award')">荣誉奖惩</button>
                            <button class="tab-btn pb-4 pt-6 transition-all" onclick="switchDataTab('library')">图书借阅</button>
                            <button class="tab-btn pb-4 pt-6 transition-all" onclick="switchDataTab('dormitory')">宿舍后勤</button>
                        </div>
                        <div class="flex-1 p-8 overflow-y-auto custom-scrollbar relative">
                            <button onclick="openModal(-1)" id="btn-add-record" class="mb-6 px-6 py-3.5 bg-dark text-white rounded-2xl font-bold text-sm shadow-md hover:bg-gray-800 flex items-center gap-2 transition-all active:scale-95">
                                <i class="ph-bold ph-plus"></i> <span id="btn-add-text">新增记录</span>
                            </button>
                            <div id="records-list" class="space-y-4 pb-12"></div>
                        </div>
                    </div>
                </div>

                <!-- 视图 2：场地预约审批视图 (New) -->
                <div id="view-reservation" class="flex flex-col h-full hidden bg-white">
                    <div class="p-8 border-b border-gray-100 flex justify-between items-center shrink-0">
                        <div>
                            <h2 class="text-2xl font-bold text-dark">场地预约审批中心</h2>
                            <p class="text-xs text-gray-400 font-bold mt-1">管理全校公共场地的使用申请</p>
                        </div>
                        <div class="flex gap-2 bg-gray-50 p-1.5 rounded-xl border border-gray-100">
                            <button onclick="ResApp.switchResTab('active')" id="res-tab-active" class="px-5 py-2 rounded-lg text-sm font-bold bg-white shadow-sm text-dark transition-all">待审批</button>
                            <button onclick="ResApp.switchResTab('approved')" id="res-tab-approved" class="px-5 py-2 rounded-lg text-sm font-bold text-gray-500 hover:text-dark transition-all">已通过</button>
                            <button onclick="ResApp.switchResTab('rejected')" id="res-tab-rejected" class="px-5 py-2 rounded-lg text-sm font-bold text-gray-500 hover:text-dark transition-all">已驳回</button>
                        </div>
                    </div>
                    <div id="reservation-list" class="flex-1 overflow-y-auto custom-scrollbar p-8 space-y-4 bg-bg/30">
                        <div class="text-center text-gray-400 py-20 text-sm font-bold">获取数据中...</div>
                    </div>
                </div>

                <!-- 视图 3：门户控制视图 -->
                <div id="view-portal" class="flex flex-col h-full p-8 overflow-y-auto custom-scrollbar hidden space-y-8 bg-white">
                    <!-- 模范学生管理 -->
                    <div class="bg-cardLight border border-gray-100 rounded-[32px] p-8 shadow-sm">
                        <div class="flex justify-between items-center mb-8">
                            <h3 class="text-xl font-bold flex items-center gap-2 text-dark"><i class="ph-fill ph-star text-accentYellow"></i> 模范榜样轮播管理</h3>
                            <button onclick="openPortalModal('star')" class="px-5 py-3 bg-dark text-white rounded-xl text-xs font-bold shadow-sm hover:scale-105 transition-transform flex items-center gap-2"><i class="ph-bold ph-plus"></i> 添加模范预设</button>
                        </div>
                        <div id="p-star-list" class="space-y-3">
                            <div class="text-center text-gray-400 py-6 text-xs font-bold">获取中...</div>
                        </div>
                    </div>

                    <!-- 新闻管理 -->
                    <div class="bg-cardLight border border-gray-100 rounded-[32px] p-8 shadow-sm">
                        <div class="flex justify-between items-center mb-8">
                            <h3 class="text-xl font-bold flex items-center gap-2 text-dark"><i class="ph-fill ph-newspaper text-accentBlue"></i> 校园新闻动态列表</h3>
                            <button onclick="openPortalModal('news')" class="px-5 py-3 bg-dark text-white rounded-xl text-xs font-bold shadow-sm hover:scale-105 transition-transform flex items-center gap-2"><i class="ph-bold ph-paper-plane-right"></i> 推送API新闻</button>
                        </div>
                        <div id="p-news-list" class="space-y-3">
                            <div class="text-center text-gray-400 py-6 text-xs font-bold">加载中...</div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- 通用编辑弹窗 (Modal) -->
    <div id="modal-overlay" class="fixed inset-0 z-[500] bg-dark/60 backdrop-blur-sm flex items-center justify-center hidden">
        <div class="bg-white w-full max-w-2xl rounded-[32px] shadow-2xl p-8 transform transition-all max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-6 shrink-0">
                <h3 class="text-2xl font-bold text-dark" id="modal-title">编辑数据</h3>
                <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 hover:bg-gray-100 transition-colors"><i class="ph-bold ph-x"></i></button>
            </div>
            <div id="modal-body" class="flex-1 overflow-y-auto pr-2 space-y-4 custom-scrollbar"></div>
            <div class="mt-8 pt-6 border-t border-gray-100 shrink-0">
                <button id="modal-save" class="w-full bg-dark text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-opacity-90 transition active:scale-95">保存至云端</button>
            </div>
        </div>
    </div>

    <script>
        if(localStorage.getItem('edu_space_role') !== 'teacher') window.location.href = 'login.html';
        function logout() { localStorage.removeItem('edu_space_role'); window.location.href = 'login.html'; }

        // --- 应用全局状态 ---
        const App = {
            users: [],
            activeStudent: null,
            activeTab: 'academic',
            records: [], 
            editingIndex: -1,
            apiNews: [],
            starStudents: []
        };

        async function init() {
            switchMainTab('student');
            await loadUsers();
            fetchApiNews();
        }

        // --- 视图与导航控制 ---
        function switchMainTab(tab) {
            document.getElementById('nav-student').className = `w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl font-bold transition-all text-left ${tab==='student'?'bg-dark text-white shadow-md':'bg-transparent text-gray-500 hover:bg-gray-100'}`;
            document.getElementById('nav-reservation').className = `w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl font-bold transition-all text-left ${tab==='reservation'?'bg-dark text-white shadow-md':'bg-transparent text-gray-500 hover:bg-gray-100'}`;
            document.getElementById('nav-portal').className = `w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl font-bold transition-all text-left ${tab==='portal'?'bg-dark text-white shadow-md':'bg-transparent text-gray-500 hover:bg-gray-100'}`;
            
            document.getElementById('view-student').classList.toggle('hidden', tab!=='student');
            document.getElementById('view-reservation').classList.toggle('hidden', tab!=='reservation');
            document.getElementById('view-portal').classList.toggle('hidden', tab!=='portal');
            
            document.getElementById('student-list-container').style.opacity = tab==='student' ? '1' : '0.2';
            document.getElementById('student-list-container').style.pointerEvents = tab==='student' ? 'auto' : 'none';

            if(tab === 'portal') renderPortalView();
            if(tab === 'reservation') ResApp.init();
        }

        async function loadUsers() {
            const { data } = await window.supabase.from('users').select('*').order('created_at', { ascending: false });
            App.users = data || [];
            renderUserList(App.users);
        }

        function filterUsers() {
            const q = document.getElementById('search-student').value.trim().toLowerCase();
            renderUserList(App.users.filter(u => u.name.toLowerCase().includes(q) || u.student_id.includes(q)));
        }

        function renderUserList(users) {
            const list = document.getElementById('user-list');
            if(!users.length) { list.innerHTML = '<div class="text-center text-gray-400 py-10 text-xs font-bold">未找到匹配学生</div>'; return; }
            
            const grouped = {};
            users.forEach(u => {
                let year = '其他';
                if (u.student_id) { const match = u.student_id.match(/^(\d{4})/); if (match) year = match[1] + '届'; }
                const cls = u.class_name || '未分配班级';
                if (!grouped[year]) grouped[year] = {};
                if (!grouped[year][cls]) grouped[year][cls] = [];
                grouped[year][cls].push(u);
            });

            let html = '';
            Object.keys(grouped).sort((a,b) => b.localeCompare(a)).forEach(year => {
                html += `<div class="mb-5"><div class="text-xs font-bold text-gray-500 bg-white border border-gray-100 px-3 py-2 rounded-xl mb-3 sticky top-0 z-10 shadow-sm flex items-center gap-2"><i class="ph-fill ph-graduation-cap text-base text-accentBlue"></i> ${year}</div><div class="space-y-3 pl-2 border-l-2 border-gray-100 ml-3">`;
                Object.keys(grouped[year]).sort().forEach(cls => {
                    html += `<div><div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 flex items-center gap-2"><div class="w-1.5 h-1.5 rounded-full bg-gray-300"></div> ${cls}</div><div class="space-y-1.5 pl-3">`;
                    grouped[year][cls].forEach(u => {
                        html += `<div onclick="selectStudent('${u.student_id}')" class="flex items-center gap-3 p-2.5 rounded-xl cursor-pointer transition-colors border ${App.activeStudent === u.student_id ? 'bg-white border-accentYellow shadow-sm' : 'bg-transparent border-transparent hover:bg-white hover:border-gray-100'}"><img src="${u.avatar}" class="w-8 h-8 rounded-full border border-gray-100 bg-white shrink-0 object-cover"><div class="flex-1 min-w-0 text-left"><div class="font-bold text-sm text-dark truncate">${u.name}</div><div class="text-[10px] text-gray-400 font-bold tracking-widest mt-0.5 truncate">${u.student_id}</div></div></div>`;
                    });
                    html += `</div></div>`;
                });
                html += `</div></div>`;
            });
            list.innerHTML = html;
        }

        async function selectStudent(id) {
            App.activeStudent = id;
            const user = App.users.find(u => u.student_id === id);
            renderUserList(document.getElementById('search-student').value.trim() ? App.users.filter(u => u.name.includes(document.getElementById('search-student').value) || u.student_id.includes(document.getElementById('search-student').value)) : App.users);
            
            document.getElementById('student-empty').classList.add('hidden');
            document.getElementById('student-header').classList.remove('hidden');
            document.getElementById('student-content').classList.remove('hidden');
            
            document.getElementById('cur-avatar').src = user.avatar;
            document.getElementById('cur-name').textContent = user.name;
            document.getElementById('cur-gender').textContent = user.gender || '未知';
            document.getElementById('cur-info').textContent = `学号: ${id} | 班级: ${user.class_name||'暂无'}`;
            
            await fetchRecords(App.activeTab);
        }

        // --- 1. 场地预约管理逻辑 (ResApp) ---
        const ResApp = {
            currentTab: 'active',
            reservations: [],

            async init() {
                this.switchResTab(this.currentTab);
            },

            async fetchReservations() {
                const listEl = document.getElementById('reservation-list');
                listEl.innerHTML = '<div class="text-center text-gray-400 py-20 text-sm font-bold"><i class="ph ph-spinner animate-spin text-2xl mb-2"></i><br>同步云端预约数据...</div>';

                // 获取预约表数据
                const { data: resData, error } = await window.supabase.from('reservations').select('*').order('created_at', { ascending: false });
                if (error) { listEl.innerHTML = '<div class="text-center text-red-500 py-20 font-bold">获取失败</div>'; return; }
                
                this.reservations = resData || [];
                this.renderList();
            },

            switchResTab(tab) {
                this.currentTab = tab;
                const tabs = ['active', 'approved', 'rejected'];
                tabs.forEach(t => {
                    const el = document.getElementById(`res-tab-${t}`);
                    if(t === tab) {
                        el.className = 'px-5 py-2 rounded-lg text-sm font-bold bg-white shadow-sm text-dark transition-all';
                    } else {
                        el.className = 'px-5 py-2 rounded-lg text-sm font-bold text-gray-500 hover:text-dark transition-all';
                    }
                });
                this.fetchReservations();
            },

            renderList() {
                const listEl = document.getElementById('reservation-list');
                const filtered = this.reservations.filter(r => r.status === this.currentTab);

                if (filtered.length === 0) {
                    listEl.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-24 text-gray-400">
                            <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-sm mb-4"><i class="ph-duotone ph-files text-4xl text-gray-300"></i></div>
                            <p class="font-bold text-dark">没有找到对应的预约记录</p>
                            <p class="text-xs mt-1">当前分类下暂无数据</p>
                        </div>`;
                    return;
                }

                let html = '';
                filtered.forEach(res => {
                    // 查找申请人信息
                    const applicant = App.users.find(u => u.student_id === res.student_id) || { name: '未知学生', avatar: 'https://via.placeholder.com/100', class_name: '未知班级' };
                    
                    // 查找协同使用者
                    const coUsers = (res.co_users || []).map(id => {
                        const u = App.users.find(user => user.student_id === id);
                        return u ? `<img src="${u.avatar}" class="w-6 h-6 rounded-full border-2 border-white -ml-2" title="${u.name}">` : '';
                    }).join('');

                    const timeStr = Array.isArray(res.time_slots) ? res.time_slots.join(', ') : res.time_slots;
                    
                    html += `
                    <div class="bg-white rounded-[24px] p-6 border border-gray-100 shadow-sm flex flex-col md:flex-row gap-6 items-start fade-in">
                        <!-- 申请人信息 -->
                        <div class="w-full md:w-48 shrink-0 flex items-center gap-3">
                            <img src="${applicant.avatar}" class="w-12 h-12 rounded-full border border-gray-100 object-cover bg-gray-50">
                            <div class="overflow-hidden">
                                <p class="font-bold text-dark text-sm truncate">${applicant.name}</p>
                                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-0.5 truncate">${res.student_id}</p>
                            </div>
                        </div>

                        <!-- 场地与详情 -->
                        <div class="flex-1 w-full border-l-0 md:border-l border-gray-100 md:pl-6">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <h4 class="text-lg font-bold text-dark flex items-center gap-2"><i class="ph-fill ph-map-pin text-accentPurple"></i> ${res.venue_name}</h4>
                                    <p class="text-xs font-bold text-accentBlue mt-1 bg-blue-50 px-2 py-1 rounded-md inline-block border border-blue-100">${res.date} | ${timeStr}</p>
                                </div>
                                <div class="flex flex-col items-end">
                                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">协同人员</span>
                                    <div class="flex items-center pl-2">${coUsers || '<span class="text-xs text-gray-300">无</span>'}</div>
                                </div>
                            </div>
                            
                            <div class="bg-gray-50 rounded-xl p-3 border border-gray-100 text-sm flex items-start gap-2">
                                <i class="ph-fill ph-info text-gray-400 mt-0.5"></i>
                                <p class="text-gray-600 font-medium">常规预约申请</p>
                            </div>
                        </div>

                        <!-- 操作区 -->
                        <div class="w-full md:w-auto shrink-0 flex md:flex-col gap-2 justify-end">
                            ${this.currentTab === 'active' ? `
                                <button onclick="ResApp.updateStatus('${res.id}', 'approved')" class="flex-1 md:w-28 py-2.5 bg-accentGreen/10 text-accentGreen hover:bg-accentGreen hover:text-white rounded-xl text-xs font-bold transition-colors">批准申请</button>
                                <button onclick="ResApp.updateStatus('${res.id}', 'rejected')" class="flex-1 md:w-28 py-2.5 bg-accentRed/10 text-accentRed hover:bg-accentRed hover:text-white rounded-xl text-xs font-bold transition-colors">驳回申请</button>
                            ` : `

            App.activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const btnTextMap = { academic: '新增成绩记录', health: '新增体检记录', award: '新增荣誉奖惩', library: '新增借阅记录' };
            const addBtn = document.getElementById('btn-add-record');
            
            if (tab === 'dormitory') {
                addBtn.classList.add('hidden');
            } else {
                addBtn.classList.remove('hidden');
                document.getElementById('btn-add-text').textContent = btnTextMap[tab];
            }
            
            if(App.activeStudent) await fetchRecords(tab);
        }

        async function fetchRecords(tab) {
            const { data } = await window.supabase.from('archives').select(tab).eq('student_id', App.activeStudent).single();

                App.records = data ? (data[tab] || []) : [];

            App.records.info.bed = document.getElementById('tc-d-bed').value;

            else alert('分配与费用信息已更新至云端！');

        async function saveRecord(tab) {
            const btn = document.getElementById('modal-save');
            const origText = btn.innerHTML;
            btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin"></i> 处理中...'; btn.disabled = true;

            const dateStr = (id) => { const v = document.getElementById(id).value; return v ? v.replace(/-/g, '.') : new Date().toLocaleDateString('zh-CN').replace(/\//g, '.'); };
            let newData = {};

            if(tab === 'academic') {
                const buildSub = (nameId, scoreId, defName) => ({ name: document.getElementById(nameId)?document.getElementById(nameId).value:defName, score: document.getElementById(scoreId).value||0, avg: 85, change: '↑', changeColor: 'text-accentGreen' });
                newData = {
                    title: document.getElementById('m-a-title').value||'测验', tag: document.getElementById('m-a-tag').value||'日常', date: dateStr('m-a-date'),
                    totalScore: document.getElementById('m-a-score').value||0, totalMax: document.getElementById('m-a-max').value||750, gradeRank: document.getElementById('m-a-rank').value||1,
                    subjects: [buildSub(null,'m-a-cn','语文'), buildSub(null,'m-a-math','数学'), buildSub(null,'m-a-en','英语'), buildSub('m-a-el1-n','m-a-el1-s'), buildSub('m-a-el2-n','m-a-el2-s'), buildSub('m-a-el3-n','m-a-el3-s')]
                };
            } else if(tab === 'health') {
                newData = {
                    title: document.getElementById('m-h-title').value||'体检报告', date: dateStr('m-h-date'), result_summary: document.getElementById('m-h-sum').value||'正常',
                    details: [{item:'血压',value:document.getElementById('m-h-bp').value||'-',status:'正常',color:'text-accentGreen'},{item:'视力',value:document.getElementById('m-h-vi').value||'-',status:'正常',color:'text-accentGreen'},{item:'身高/体重',value:document.getElementById('m-h-hw').value||'-',status:'正常',color:'text-accentGreen'},{item:'血氧',value:document.getElementById('m-h-sp').value||'-',status:'正常',color:'text-accentGreen'}]
                };
            } else if(tab === 'award') {
                newData = { type: document.getElementById('m-aw-type').value, item: document.getElementById('m-aw-title').value||'记录', issuer: document.getElementById('m-aw-issuer').value||'未知', description: document.getElementById('m-aw-desc').value, date: dateStr('m-aw-date') };
            } else if(tab === 'library') {
                newData = { title: document.getElementById('m-l-title').value||'未知', author: document.getElementById('m-l-author').value||'未知', status: document.getElementById('m-l-status').value, borrow_date: dateStr('m-l-bdate'), due_date: dateStr('m-l-ddate'), cover: document.getElementById('m-l-cover').value||'https://via.placeholder.com/150' };
            }

            if(App.editingIndex >= 0) App.records[App.editingIndex] = newData;
            else App.records.unshift(newData);

            try {
                const { error } = await window.supabase.from('archives').update({ [tab]: App.records }).eq('student_id', App.activeStudent);
                if(error) throw error;
                closeModal();
                renderRecordsList();
            } catch(e) { alert('保存失败: ' + e.message); } finally { btn.innerHTML = origText; btn.disabled = false; }
        }

        async function deleteRecord(index) {
            if(!confirm('该操作不可恢复，确定要删除这条记录吗？')) return;
            App.records.splice(index, 1);
            await window.supabase.from('archives').update({ [App.activeTab]: App.records }).eq('student_id', App.activeStudent);
            renderRecordsList();
        }

        // --- 门户配置模块 ---
        async function renderPortalView() {
            const { data } = await window.supabase.from('system_settings').select('value').eq('key', 'star_students').single();
            let stars = data && Array.isArray(data.value) ? data.value : [];
            App.starStudents = stars;
            
            const starList = document.getElementById('p-star-list');
            if(stars.length === 0) starList.innerHTML = '<div class="text-center text-gray-400 py-6 text-xs font-bold border border-dashed rounded-xl border-gray-200">暂无模范预设</div>';
            else starList.innerHTML = stars.map((s, idx) => `
                <div class="flex items-center justify-between gap-4 bg-gray-50 border border-gray-100 p-4 rounded-2xl">
                    <div class="flex items-center gap-4 min-w-0">
                        <img src="${s.avatar}" class="w-12 h-12 rounded-full border border-gray-200 shrink-0 object-cover bg-white">
                        <div class="truncate">
                            <h4 class="text-sm font-bold text-dark truncate">${s.name} <span class="text-[10px] bg-white border border-gray-100 px-2 py-0.5 rounded text-gray-500 ml-2 font-normal">${s.title}</span></h4>
                            <p class="text-xs text-gray-400 italic mt-1 truncate">"${s.quote}"</p>
                        </div>
                    </div>
                    <button onclick="deleteStar(${idx})" class="p-2 bg-white rounded-lg text-accentRed border border-red-50 hover:bg-red-50 transition shrink-0 shadow-sm"><i class="ph-bold ph-trash"></i></button>
                </div>
            `).join('');

            const { data: newsData } = await window.supabase.from('news').select('*').order('created_at', { ascending: false });
            const nList = document.getElementById('p-news-list');
            if(!newsData || !newsData.length) nList.innerHTML = '<div class="text-center text-gray-400 py-6 text-xs font-bold border border-dashed rounded-xl border-gray-200">暂无在线资讯，前端将显示缺省数据</div>';
            else nList.innerHTML = newsData.map(n => `
                <div class="flex justify-between items-center bg-gray-50 border border-gray-100 p-4 rounded-2xl">
                    <div class="truncate pr-4 flex flex-col items-start gap-1">
                        <span class="text-[10px] font-bold bg-white text-gray-500 px-2 py-0.5 rounded-md border border-gray-200 shadow-sm">${n.tag}</span>
                        <span class="font-bold text-sm text-dark truncate w-full">${n.title}</span>
                        <p class="text-[10px] text-gray-400 font-bold tracking-widest">${n.date}</p>
                    </div>
                    <button onclick="deleteNews('${n.id}')" class="p-2 bg-white rounded-lg text-accentRed border border-red-50 hover:bg-red-50 transition shrink-0 shadow-sm"><i class="ph-bold ph-trash"></i></button>
                </div>
            `).join('');
        }

        async function fetchApiNews() {
            try {
                const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=http://www.chinanews.com.cn/rss/edu.xml');
                const data = await res.json();
                if(data.status === 'ok') App.apiNews = data.items.slice(0, 15);
            } catch(e){}
        }

        async function openPortalModal(type) {
            document.getElementById('modal-title').textContent = type === 'star' ? '配置模范先锋' : '推送全网资讯';
            let html = '';
            const inputCls = "w-full bg-gray-50 border border-gray-100 rounded-xl p-3.5 font-bold text-sm outline-none focus:border-accentYellow focus:bg-white transition-colors mb-4";
            
            if(type === 'star') {
                html = `
                    <input id="p-m-name" class="${inputCls}" placeholder="真实姓名 (例: 林书豪)">
                    <input id="p-m-title" class="${inputCls}" placeholder="头衔标注 (例: 高二3班 | 科技新星)">
                    <textarea id="p-m-quote" class="${inputCls} h-24" placeholder="模范人物寄语..."></textarea>
                    <input id="p-m-avatar" class="${inputCls}" placeholder="头像图片URL (留空则系统自动分配)">
                `;
            } else if (type === 'news') {
                const opts = App.apiNews.map((n, i) => `<option value="${i}">${n.title}</option>`).join('');
                html = `
                    <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl mb-6">
                        <label class="text-[10px] font-bold text-blue-500 uppercase tracking-widest block mb-2">获取到的最新教育头条</label>
                        <select id="p-m-api" class="w-full bg-white border border-blue-200 rounded-xl p-3 font-bold text-sm outline-none text-dark shadow-sm">${opts||'<option>网络异常，拉取失败</option>'}</select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">新闻前缀标签</label><input id="p-m-tag" class="${inputCls} !mb-0" value="🎓 教育资讯"></div>
                        <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">卡片背景光晕配色</label>
                        <select id="p-m-color" class="${inputCls} !mb-0"><option value="bg-accentPurple,bg-accentOrange">紫色 + 橙色</option><option value="bg-accentRed,bg-accentYellow">红色 + 黄色</option><option value="bg-accentBlue,bg-accentGreen">蓝色 + 绿色</option></select></div>
                    </div>`;
            }
            document.getElementById('modal-body').innerHTML = html;
            document.getElementById('modal-save').onclick = () => savePortal(type);
            document.getElementById('modal-overlay').classList.remove('hidden');
        }

        async function savePortal(type) {
            const btn = document.getElementById('modal-save'); btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin text-lg"></i> 推送云端...'; btn.disabled = true;
            try {
                if(type === 'star') {
                    const name = document.getElementById('p-m-name').value.trim();
                    if(!name) throw new Error("姓名不能为空");
                    const newStar = { 
                        name: name, title: document.getElementById('p-m-title').value || '未设置头衔', 
                        quote: document.getElementById('p-m-quote').value || '持续学习，探索未知。', avatar: document.getElementById('p-m-avatar').value || ('https://api.dicebear.com/7.x/notionists/svg?seed=' + Math.random())
                    };
                    App.starStudents.unshift(newStar);
                    await window.supabase.from('system_settings').upsert({ key: 'star_students', value: App.starStudents });
                } else if (type === 'news') {
                    const item = App.apiNews[document.getElementById('p-m-api').value];
                    if(!item) throw new Error("无可用新闻");
                    const colors = document.getElementById('p-m-color').value.split(',');
                    const news = {
                        tag: document.getElementById('p-m-tag').value, title: item.title, desc: item.description ? item.description.replace(/<[^>]+>/g, '').substring(0, 60) + '...' : "点击阅读详情",
                        date: item.pubDate ? item.pubDate.split(' ')[0] : new Date().toLocaleDateString('zh-CN').replace(/\//g, '-'), circle_color_1: colors[0], circle_color_2: colors[1], url: item.link
                    };
                    await window.supabase.from('news').insert([news]);
                }
                closeModal(); renderPortalView();
            } catch(e) { alert(e.message); } finally { btn.innerHTML = '保存至云端'; btn.disabled = false; }
        }

        async function deleteStar(index) {
            if(!confirm('确定要在主页轮播中移除该模范学生吗？')) return;
            App.starStudents.splice(index, 1);
            await window.supabase.from('system_settings').upsert({ key: 'star_students', value: App.starStudents });
            renderPortalView();
        }

        async function deleteNews(id) {
            if(!confirm('确定彻底删除该条校园动态吗？')) return;
            await window.supabase.from('news').delete().eq('id', id);
            renderPortalView();
        }

        window.onload = init;
    </script>
</body>
</html>
